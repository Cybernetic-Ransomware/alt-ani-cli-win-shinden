  ytdlp_failed: "yt-dlp nie mógł wyodrębnić strumienia z {embed_url}: {exc}"
  all_failed: "Wszystkie ekstraktory zawiodły dla {embed_url}"
  all_failed_exc: "Wszystkie ekstraktory zawiodły dla {embed_url}: {exc}"

dood:
  bad_base_url: "dood: nie można sparsować bazowego URL z {embed_url}"
  no_pass_md5: "dood: nie znaleziono ścieżki pass_md5 w {embed_url}"

jwplayer:
  no_video_url: "jwplayer extractor: nie można znaleźć URL wideo w {embed_url}"

mp4upload:
  no_video_url: "mp4upload: nie można znaleźć URL wideo w {embed_url}"

streamtape:
  no_token: "streamtape: nie można sparsować tokenu z {embed_url}"

ytdlp:
  no_info: "yt-dlp nie zwróciło informacji dla {embed_url}"
  no_url: "Brak URL wideo w wynikach yt-dlp dla {embed_url}"

player:
  mpv_not_found: |-
    mpv / mpv.net nie znaleziony.
    Zainstaluj przez:  winget install mpv.net
      lub:             winget install mpv
      lub:             scoop install mpv
    Możesz też wskazać ścieżkę ręcznie:
      $env:ANI_CLI_PLAYER = 'C:\path\to\mpvnet.exe'
  vlc_not_found: |-
    VLC nie znaleziony w PATH.
    Zainstaluj przez:  winget install VideoLAN.VLC
    Lub wskaż ścieżkę:  ANI_CLI_PLAYER=C:\path\to\vlc.exe
