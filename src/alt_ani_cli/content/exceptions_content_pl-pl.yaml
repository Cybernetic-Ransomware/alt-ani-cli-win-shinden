    Shinden wymaga potwierdzenia wieku (18+) dla tej serii.
    Zaloguj się na shinden.pl w przeglądarce i potwierdź wiek, a następnie skopiuj ciasteczka sesji do pliku cookies lub użyj --url z zalogowaną sesją.

extract:
