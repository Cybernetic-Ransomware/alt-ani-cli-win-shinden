cli:
  description: "Oglądaj anime z shinden.pl bezpośrednio w terminalu."
  epilog: |
    Przyklady:
      alt-ani-cli fate strange fake            interaktywne wyszukiwanie
      alt-ani-cli -S 1 -e 1-5 fate strange    odcinki 1-5, pierwszy wynik
      alt-ani-cli -S 1 -e -1 soul eater        ostatni odcinek
      alt-ani-cli --url https://shinden.pl/series/65137-fate-strange-fake -e 3
      alt-ani-cli -c                           kontynuuj z historii
      alt-ani-cli -d -e 3 soul eater           pobierz odcinek 3
      alt-ani-cli --lang pl -e 1 vinland saga  tylko polskie audio
      alt-ani-cli --lang jp --subs pl -S 1 -e 1 berserk

    Filtrowanie jezyka: --lang pl (dubbing PL), --lang jp --subs pl (sub PL)
    Zakres odcinkow:    "5" (jeden), "1-5" (zakres), "-1" (ostatni), "1 5 7" (lista)
  help:
    query: "Tytuł do wyszukania na shinden.pl (pomijany gdy --url lub -c)."
    url: "Bezpośredni URL serii (https://shinden.pl/series/...)."
    resume: "Kontynuuj oglądanie z historii."
    download: "Pobierz odcinek zamiast odtwarzać."
    delete_history: "Wyczyść historię i wyjdź."
    episode: 'Numer odcinka lub zakres: "5", "1-5", "-1" (ostatni).'
    quality: 'Preferowana jakość: "best", "worst", "1080p", "720p" … (domyślnie: menu interaktywne lub "best").'
    select_nth: "Automatycznie wybierz N-ty wynik wyszukiwania (1-bazowy)."
    vlc: "Użyj vlc.exe zamiast mpv.exe."
    no_detach: "Uruchom player na pierwszym planie (blokuje terminal)."
    debug: "Wypisz bezpośrednie linki wideo, nie uruchamiaj playera."
    player_name: 'Filtruj po nazwie playera: "CDA", "Mp4upload", "Sibnet" …'
    lang: "Filtruj po języku audio (lang_audio)."
    subs: "Filtruj po języku napisów (lang_subs)."
    cookies_file: "Plik ciasteczek w formacie Netscape (eksportuj np. rozszerzeniem 'Get cookies.txt')."
    cookies_browser: "Czytaj ciasteczka z przeglądarki (wymagane dla treści 18+ na CDA itp.)."
    allow_fallback: "Gdy filtry --lang/--subs/--player-name nic nie dopasują, użyj pełnej listy playerów zamiast kończyć błędem."
    show_sources: "Pokaż realny host każdego playera na liście (tryb interaktywny; kosztowne — ~7 s na player przez antibota shinden)."
  errors:
    missing_input: "Podaj tytuł do wyszukania, URL (--url) lub użyj -c."

